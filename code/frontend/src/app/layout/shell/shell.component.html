<div
  class="shell"
  [class.shell--collapsed]="sidebarCollapsed() && !isMobile()"
  [class.shell--mobile]="isMobile()"
>
  <!-- Mobile backdrop -->
  @if (isMobile() && mobileMenuOpen()) {
    <!-- Backdrop dismissal is pointer-only sugar; keyboard users dismiss via the Escape HostListener. -->
    <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
    <div class="shell__backdrop" (click)="closeMobileMenu()"></div>
  }

  <app-nav-sidebar
    [collapsed]="sidebarCollapsed() && !isMobile()"
    [mobileOpen]="mobileMenuOpen()"
    [isMobile]="isMobile()"
    (navClicked)="closeMobileMenu()"
  />

  <div class="shell__main">
    <app-toolbar
      [sidebarCollapsed]="sidebarCollapsed()"
      (toggleSidebar)="toggleSidebar()"
    />

    <main class="shell__content">
      <div class="shell__content-inner">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
